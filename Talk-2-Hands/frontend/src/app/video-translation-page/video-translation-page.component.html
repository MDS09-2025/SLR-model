<!-- Video Translation Page -->
<div class="bg-[url('/images/LandingPage.svg')] bg-cover bg-center min-h-screen text-white p-8 relative overflow-hidden">
  <!-- Navbar -->
  <app-nav-bar></app-nav-bar>

  <!-- Page header -->
  <header class="max-w-5xl mx-auto flex items-center gap-3 mb-6 relative z-10">
    <span class="text-xl font-semibold">Video Translation</span>
  </header>

  <!-- Main -->
  <main class="max-w-5xl mx-auto relative z-10">
    <!-- Main video player card -->
    <div #videoCard class="relative rounded-2xl overflow-hidden bg-black ring-1 ring-white/10 shadow-2xl">
      <div class="aspect-video">
        <video
          #player
          class="w-full h-full"
          [src]="videoSrc"
          controls
          playsinline>
        </video>
      </div>
    </div> 
    <!-- add 3d character posing -->
    <!-- 3D rendering logic (later)-->
    
    <div class="mt-4 flex items-center justify-between gap-3">
      <div class="flex gap-2">
        <input type="file" accept="video/*" class="hidden" #fileInput (change)="onFile($event)">
        <!-- Temporary upload-->
        <button
          class="rounded-full px-4 py-2 bg-neutral-700 hover:bg-neutral-600 text-white/90 transition"
          (click)="fileInput.click()">
          Upload
        </button>
      </div>

      <div class="flex gap-3">
        <!-- Download -->
        <button
          class="rounded-full px-6 py-3 bg-gradient-to-r from-[#B6C3FF] to-[#5271FF] hover:opacity-90"
          (click)="download()">
          Download
        </button>
        <!-- Full screen -->
        <button
          class="rounded-full px-6 py-3 bg-gradient-to-r from-[#B6C3FF] to-[#5271FF] hover:opacity-90"
          (click)="toggleFullScreen()">
          Full Screen
        </button>
      </div>
    </div>

    <p class="mt-3 text-sm text-neutral-300">{{ status }}</p>
  </main>
</div>
